version: 1
applications:
  - appRoot: apps/inventory
    backend:
      phases:
        preBuild:
          commands:
            - npm ci --cache .npm --prefer-offline --prefix ../..
        build:
          commands:
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - npm ci --cache .npm --prefer-offline
        build:
          commands:
            - npm run build --workspace=@la/inventory
      artifacts:
        baseDirectory: apps/inventory/.next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - apps/inventory/.next/cache/**/*
          - .npm/**/*
  - appRoot: apps/shop
    backend:
      phases:
        preBuild:
          commands:
            - npm ci --cache .npm --prefer-offline --prefix ../..
        build:
          commands:
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - npm ci --cache .npm --prefer-offline
        build:
          commands:
            - npm run build --workspace=@la/shop
      artifacts:
        baseDirectory: apps/shop/.next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - apps/shop/.next/cache/**/*
          - .npm/**/*
